name: Takt

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: takt-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0
  MISE_AUTO_INSTALL: "false"
  MISE_TASK_RUN_AUTO_INSTALL: "false"
  MISE_NOT_FOUND_AUTO_INSTALL: "false"
  MISE_EXEC_AUTO_INSTALL: "false"

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust"
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: takt-linux
          cache-on-failure: true
      - name: Build
        run: mise run ci:build

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust"
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: takt-linux
          cache-on-failure: true
      - name: Test
        run: mise run ci:test

  format:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust"
          cache: true
      - name: Format
        run: mise run ci:fmt

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust"
          cache: true
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: takt-linux
          cache-on-failure: true
      - name: Lint
        run: mise run ci:lint
