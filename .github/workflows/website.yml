name: Website

on:
  pull_request:
    branches:
      - main
    paths:
      - "website/**"
      - "mise.toml"
      - "mise/tasks/website/**"
      - ".github/workflows/website.yml"
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "mise.toml"
      - "mise/tasks/website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: website-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0
  MISE_AUTO_INSTALL: "false"
  MISE_TASK_RUN_AUTO_INSTALL: "false"
  MISE_NOT_FOUND_AUTO_INSTALL: "false"
  MISE_EXEC_AUTO_INSTALL: "false"

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "node aube"
          cache: true
      - name: Build website
        run: mise run website:build
      - uses: actions/upload-artifact@v4
        with:
          name: website
          path: website/_site
          if-no-files-found: error

  deploy:
    name: Deploy
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://takt-website.workers.dev
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "node aube"
          cache: true
      - name: Build website
        run: mise run website:build
        working-directory: ${{ github.workspace }}
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.90.1"
          workingDirectory: website
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
