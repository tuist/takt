name: Website

on:
  pull_request:
    branches:
      - main
    paths:
      - "website/**"
      - "mise.toml"
      - "mise/tasks/website/**"
      - ".github/workflows/website.yml"
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "mise.toml"
      - "mise/tasks/website/**"
      - ".github/workflows/website.yml"

permissions:
  contents: read

concurrency:
  group: website-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0
  MISE_AUTO_INSTALL: "false"
  MISE_TASK_RUN_AUTO_INSTALL: "false"
  MISE_NOT_FOUND_AUTO_INSTALL: "false"
  MISE_EXEC_AUTO_INSTALL: "false"

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "node aube"
          cache: true
      - name: Build website
        run: mise run website:build
      - uses: actions/upload-artifact@v4
        with:
          name: website
          path: website/_site
          if-no-files-found: error
